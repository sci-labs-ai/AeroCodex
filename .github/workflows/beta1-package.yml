name: Beta 1 automated candidates

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qualify:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pyyaml
      - name: Run equation batch compiler self-test
        run: python scripts/equation_batch.py self-test
      - name: Compile governed equation batches
        run: |
          cargo run -p xtask -- equation-batch generate --manifest equation-batches/m00-canonical-units.tsv --output-dir "${{ runner.temp }}/aerocodex-equation-batch-canonical"
          cargo run -p xtask -- equation-batch verify --manifest equation-batches/m00-canonical-units.tsv --output-dir "${{ runner.temp }}/aerocodex-equation-batch-canonical" --timeout-seconds 600
          cargo run -p xtask -- equation-batch generate --manifest equation-batches/m00-angle-vector.tsv --output-dir "${{ runner.temp }}/aerocodex-equation-batch-angle-vector"
          cargo run -p xtask -- equation-batch verify --manifest equation-batches/m00-angle-vector.tsv --output-dir "${{ runner.temp }}/aerocodex-equation-batch-angle-vector" --timeout-seconds 600
          cargo run -p xtask -- equation-batch generate --manifest equation-batches/a4-atmosphere-thermo-gasdynamics.tsv --output-dir "${{ runner.temp }}/aerocodex-equation-batch-a4"
          cargo run -p xtask -- equation-batch verify --manifest equation-batches/a4-atmosphere-thermo-gasdynamics.tsv --output-dir "${{ runner.temp }}/aerocodex-equation-batch-a4" --timeout-seconds 600
      - name: Run native automated qualification and packaging
        run: cargo run -p xtask -- verify beta1-automated --output-dir "${{ runner.temp }}/aerocodex-beta1-automated"
      - name: Upload native candidate and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aerocodex-beta1-automated-${{ runner.os }}-${{ runner.arch }}
          path: ${{ runner.temp }}/aerocodex-beta1-automated
          if-no-files-found: warn
