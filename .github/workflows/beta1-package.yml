name: Beta 1 package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify release verifier
        run: python scripts/verify_beta1_release.py --self-test
      - name: Build and verify Beta 1 concept archive
        run: python scripts/package_beta1_release.py --repo . --output-dir "${{ runner.temp }}/aerocodex-beta1"
      - name: Upload candidate archive and report
        uses: actions/upload-artifact@v4
        with:
          name: aerocodex-beta1-concept-${{ runner.os }}-${{ runner.arch }}
          path: |
            ${{ runner.temp }}/aerocodex-beta1/*.zip
            ${{ runner.temp }}/aerocodex-beta1/package-report.json
          if-no-files-found: error
