name: Rust

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install --upgrade pip pyyaml
      - run: python scripts/verify_beta1_release.py --self-test
      - run: git diff --check
      - run: sha256sum -c checksums/SHA256SUMS
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets --all-features
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --all-features
      - run: cargo run -p aero-codex-cli -- version --json
      - run: cargo run -p aero-codex-cli -- run formula_vault.m00.canonical.distance_to_canonical distance=-42 distance_unit=7 --json
      - run: cargo run -p aero-codex-cli -- self-check --json
      - run: cargo run -p xtask -- verify --all
      - run: cargo run -p xtask -- dependency-policy
      - run: python scripts/verify_thinfilm_artifact.py
      - run: python nomenclature/tooling/aerocodex_nom_lint.py --root nomenclature
      - run: python nomenclature/tooling/aerocodex_acronym_inventory.py --repo-root . --nomenclature-root nomenclature --check-new --baseline nomenclature/generated/current_repo_acronym_baseline.json
      - run: python nomenclature/tooling/aerocodex_terminology.py --root nomenclature export-jsonl --output nomenclature/generated/terminology/index.jsonl
      - run: git diff --exit-code nomenclature/generated/terminology/index.jsonl
      - run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
