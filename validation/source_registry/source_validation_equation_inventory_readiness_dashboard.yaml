id: source.validation.equation_inventory.readiness_dashboard.research_required
title: Equation inventory and readiness dashboard source seed
category: validation
status: research_required
intended_use:
  - Register the equation inventory and readiness dashboard verifier as governance metadata.
  - Preserve the distinction between executable research kernels, metadata-only formula-vault intake records, explicit runtime-resolution links, external rows with terminal dispositions, remaining external M07 backlog rows, validation-card-only records, and helper algorithms.
requested_details:
  - Machine-readable inventory row coverage for current public Rust functions.
  - Formula-vault metadata-only candidate-record count cross-check.
  - Exact candidate-to-runtime resolution cross-check against governed M00 equation-batch manifests.
  - Exact A11 classifier-to-terminal-disposition cross-check for the bounded external unit-conversion wave.
  - Exact A12 first-40 classifier-to-terminal-disposition cross-check for the bounded external vector-helper wave.
  - Exact A13 remaining-34 classifier-to-terminal-disposition cross-check completing the 74-row vector-helper group.
  - Exact A14 first-40 and A15 remaining-9 classifier-to-terminal-disposition cross-checks for the complete 49-row classical two-body algebra group, including preservation of the medium-risk classifier tier.
  - Exact A16 first-40 classifier-to-terminal-disposition cross-check for the orbital-geometry and conic-branch group, including alias, helper-exclusion, contract-block, remaining-group, and medium-risk-tier preservation counts.
  - Exact A17 next-40 cross-check for the same group, including wave-1 exclusion, alias/helper/block totals, remaining-group count, and preservation of 38 medium-risk plus 2 high-risk labels.
  - Exact A18 third-40 cross-check for the same group, including A16-A17 exclusion, alias/helper/block totals, remaining-group count, and preservation of 33 medium-risk plus 7 high-risk labels.
  - Exact A19 fourth-40 cross-check for the same group, including A16-A18 exclusion, alias/helper/block totals, remaining-group count, and preservation of 37 medium-risk plus 3 high-risk labels.
  - Exact A20 fifth-40 cross-check for the same group, including A16-A19 exclusion, helper/block totals, remaining-group count, and preservation of 26 medium-risk plus 14 high-risk labels.
  - Exact A21 sixth-40 cross-check for the same group, including A16-A20 exclusion, alias/helper/block totals, remaining-group count, and preservation of 18 medium-risk plus 22 high-risk labels.
  - Exact A22 seventh-40 cross-check for the same group, including A16-A21 exclusion, alias/helper/block totals, remaining-group count, and preservation of 38 medium-risk plus 2 high-risk labels.
  - External M07 processed and remaining-backlog aggregate count cross-checks.
  - Validation-card and source-registry seed count cross-checks.
implementation_notes:
  - Dependency-free historical resolution verifiers plus the existing xtask verifier.
  - A11-A13 reuse existing M00 runtime, contract, validation-card, and source-seed records for aliases.
  - A14-A15 reuse existing A7 equation-batch runtime, contract, validation-card, and source-seed records for exact aliases; ambiguous, unsupported, or unit-system-specific algebra remains contract-blocked.
  - A16 reuses existing A7 specific-angular-momentum and eccentricity-vector records for exact aliases, excludes support helpers from formula scope, and keeps geometry/conic-branch-sensitive rows contract-blocked.
  - A17 reuses existing A7 specific-angular-momentum, eccentricity-vector, and node-vector records for exact aliases, excludes composite support algorithms, and keeps frame/time/conic-sensitive rows contract-blocked.
  - A18 reuses the existing A7 eccentricity-vector record for its exact alias, excludes generic math and composite maneuver algorithms, and keeps frame/time, maneuver, perturbation, conic, and solver-sensitive rows contract-blocked.
  - A19 reuses existing A7 semimajor-axis, elliptic anomaly-conversion, and eccentricity-vector records for exact aliases; excludes internal/composite Lagrange, orbit-summary, and universal-variable helpers; and keeps anomaly, time-of-flight, Stumpff, and state-derived conic rows contract- or policy-blocked.
  - A20 excludes internal f/g intermediates, solver residual/search orchestration, sighting linear-system, Stumpff bundle, and ballistic classification/summary helpers; and keeps f/g series, Gauss/Lambert, frame rotation, orbit determination, Stumpff scalar, ballistic parameter, and free-flight range/time rows contract- or policy-blocked.
  - A21 reuses the existing A7 eccentricity-vector record for one exact alias; excludes generic atan2, launch-error summary bundles, and gravity-assist orchestration helpers; and keeps spherical navigation, launch-error sensitivity, ballistic targeting, rotating-body transform, conic time-of-flight, and B-plane rows contract- or policy-blocked.
  - A22 reuses the existing A7 sphere-of-influence record for one exact alias; excludes composite gravity-assist, patched-conic, state-construction, coordinate-rotation, scalar-validation, scalar-math, and I/O helpers; and keeps hyperbolic geometry, capture/departure, flyby feasibility, conic radius, and elliptic-period rows contract- or policy-blocked.
  - A12-A13 exclude internal shape helpers from formula scope and keep determinant/frame, skew-matrix, and true-anomaly contract-sensitive rows blocked.
  - No formula implementation is introduced.
  - No M07 source code, fixture, generated binary, or Scilab execution output is imported.
limits:
  - Does not certify or validate any formula for flight, mission, habitat, medical, operational, or regulated use.
  - Does not authorize a public application programming interface or runtime surface.
  - Uses existing classifier metadata and registered source locators only; it does not inspect raw external M07 or Scilab source text.
notes: Inventory/readiness governance source seed only; all rows remain blocked with row-local reasons, and terminal external dispositions do not imply parity or readiness.
