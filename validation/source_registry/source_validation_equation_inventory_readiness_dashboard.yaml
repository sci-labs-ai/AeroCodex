id: source.validation.equation_inventory.readiness_dashboard.research_required
title: Equation inventory and readiness dashboard source seed
category: validation
status: research_required
intended_use:
  - Register the equation inventory and readiness dashboard verifier as governance metadata.
  - Preserve the distinction between executable research kernels, metadata-only formula-vault intake records, explicit runtime-resolution links, external rows with terminal dispositions, remaining external M07 backlog rows, validation-card-only records, and helper algorithms.
requested_details:
  - Machine-readable inventory row coverage for current public Rust functions.
  - Formula-vault metadata-only candidate-record count cross-check.
  - Exact candidate-to-runtime resolution cross-check against governed M00 equation-batch manifests.
  - Exact A11 classifier-to-terminal-disposition cross-check for the bounded external unit-conversion wave.
  - Exact A12 first-40 classifier-to-terminal-disposition cross-check for the bounded external vector-helper wave.
  - External M07 processed and remaining-backlog aggregate count cross-checks.
  - Validation-card and source-registry seed count cross-checks.
implementation_notes:
  - Dependency-free Python resolution verifiers plus the existing xtask verifier.
  - A11-A12 reuse existing M00 runtime, contract, validation-card, and source-seed records for aliases.
  - A12 excludes internal shape helpers from formula scope and keeps determinant/frame-sensitive rows contract-blocked.
  - No formula implementation is introduced.
  - No M07 source code, fixture, generated binary, or Scilab execution output is imported.
limits:
  - Does not certify or validate any formula for flight, mission, habitat, medical, operational, or regulated use.
  - Does not authorize a public application programming interface or runtime surface.
  - Uses existing classifier metadata and registered source locators only; it does not inspect raw external M07 or Scilab source text.
notes: Inventory/readiness governance source seed only; all rows remain blocked with row-local reasons, and terminal external dispositions do not imply parity or readiness.
