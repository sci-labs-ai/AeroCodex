id: validation.equation_inventory.readiness_dashboard
name: Equation inventory and readiness dashboard verifier
category: validation
status: research_required
source:
  id: source.validation.equation_inventory.readiness_dashboard.research_required
  status: research_required
assumptions:
  - The inventory is a machine-readable governance index, not formula implementation code.
  - Public Rust functions are classified as executable research equations or helper algorithms without creating new public application programming interfaces.
  - The remaining external M07 backlog is derived from the registered represented-row count minus formula-vault candidate records and minus rows with terminal external-resolution dispositions.
  - Runtime and alias resolutions link to existing governed equation-batch runtimes; they are not new implementations or readiness promotions.
  - Contract-blocked external rows remain blocked until an explicit family contract and governed runtime exist.
domain:
  discipline: validation
  scope: Equation inventory, formula-vault runtime resolution, and external-backlog terminal-disposition metadata
inputs:
  - validation/equation_inventory.tsv
  - validation/cards/
  - validation/source_registry/
  - formula-vault/candidates/
  - formula-vault/resolutions/m00_runtime_links.tsv
  - formula-vault/resolutions/m07_unit_conversion_wave1.tsv
  - formula-vault/resolutions/m07_vector_helper_wave1.tsv
  - formula-vault/resolutions/m07_vector_helper_wave2.tsv
  - formula-vault/resolutions/m07_two_body_algebra_wave1.tsv
  - formula-vault/resolutions/m07_two_body_algebra_wave2.tsv
  - formula-vault/resolutions/m07_orbital_geometry_conic_wave1.tsv
  - formula-vault/resolutions/m07_orbital_geometry_conic_wave2.tsv
  - formula-vault/resolutions/m07_orbital_geometry_conic_wave3.tsv
  - formula-vault/resolutions/m07_orbital_geometry_conic_wave4.tsv
  - formula-vault/resolutions/m07_orbital_geometry_conic_wave5.tsv
  - formula-vault/resolutions/m07_orbital_geometry_conic_wave6.tsv
  - formula-vault/resolutions/m07_orbital_geometry_conic_wave7.tsv
  - equation-batches/m00-angle-vector.tsv
  - equation-batches/m00-canonical-units.tsv
  - docs/source_intake/m07_formula_family_classifier/low_risk_candidate_shortlist.csv
  - crates/*/src/*.rs public function declarations
outputs:
  - machine-readable counts for executable research equations, metadata-only candidate records, resolved runtime links, external rows with terminal dispositions, remaining external M07 backlog rows, validation cards, source-registry seeds, validation-card-only records, and helper algorithms
  - terminal alias, internal-helper exclusion, or contract-blocked dispositions for the bounded A11-A22 waves
  - blocked item reasons for every inventory row
tests:
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo run -p xtask -- verify formula-vault
  - cargo test -p xtask equation_inventory
  - cargo run -p xtask -- verify equation-inventory
  - cargo run -p xtask -- verify --all
failure_modes:
  - Inventory row count does not match governed counts.
  - Public Rust function is missing from executable/helper inventory coverage.
  - Formula-vault metadata candidate count diverges from inventory count.
  - Candidate formula IDs and runtime-resolution rows are not an exact union.
  - A resolution row disagrees with its governed equation-batch runtime, contract, validation-card, source-seed, or status.
  - An external resolution row is missing, duplicated, nonterminal, or inconsistent with its classifier metadata.
  - External M07 processed or backlog aggregates diverge from registered represented rows minus candidate and terminally processed rows.
  - Inventory row is not blocked or lacks a block reason.
notes: Research-required governance verifier only; no formula implementation, source import, generated formula code, public application programming interface, M07 or Scilab parity, flight readiness, mission readiness, certification, operational approval, or regulated-use approval is claimed.
