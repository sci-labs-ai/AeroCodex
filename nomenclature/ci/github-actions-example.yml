name: AeroCodex nomenclature checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nomenclature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install optional dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: AeroCodex nomenclature lint
        run: |
          python nomenclature/tooling/aerocodex_nom_lint.py --root nomenclature

      - name: Adoption-baseline acronym guard
        run: |
          python nomenclature/tooling/aerocodex_acronym_inventory.py \
            --repo-root . \
            --nomenclature-root nomenclature \
            --check-new \
            --baseline nomenclature/generated/current_repo_acronym_baseline.json

      - name: Export AI terminology index
        run: |
          python nomenclature/tooling/aerocodex_terminology.py \
            --root nomenclature \
            export-jsonl \
            --output nomenclature/generated/terminology/index.jsonl
          git diff --exit-code nomenclature/generated/terminology/index.jsonl
