version: 0.1.0-draft
kind: acx.bridges
records:
  - bridge_id: acx:bridge:trajectory.fit.window:E014:v1
    equation_id: E-trajectory-fit-014
    scope: acx.math.trajectory.fit.window.E014
    status: approved
    implemented_by:
      - crate::trajectory::fit::estimate_window_velocity
    bindings:
      - math_symbol: n_s
        symbol_id: acx:math:trajectory.fit.window:E014:sample_count:v1
        rust_identifier: sample_count
        rust_type: usize
        unit: count

      - math_symbol: i
        symbol_id: acx:math:trajectory.fit.window:E014:sample_index:v1
        rust_identifier: sample_index
        rust_type: usize
        unit: count

      - math_symbol: Δt
        symbol_id: acx:math:trajectory.fit.window:E014:sample_interval:v1
        rust_identifier: sample_interval_seconds
        rust_type: f64
        unit: seconds

      - math_symbol: x_i
        symbol_id: acx:math:trajectory.fit.window:E014:position_sample:v1
        rust_identifier: position_samples[sample_index]
        rust_type: PositionNedMeters
        unit: meters
        frame: local_tangent_ned

      - math_symbol: v_hat
        symbol_id: acx:math:trajectory.fit.window:E014:estimated_velocity:v1
        rust_identifier: estimated_velocity_mps
        rust_type: VelocityNedMetersPerSecond
        unit: meters_per_second
        frame: local_tangent_ned
