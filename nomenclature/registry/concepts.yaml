version: 0.1.0-draft
kind: acx.concepts
records:
- canonical: aircraft_registration
  namespace: domain.term
  display_label: Aircraft Registration
  definition: Civil registration identifier assigned to an aircraft.
  status: approved
  aliases:
  - tail_number
  - n_number
  - registration_mark
  source_terms:
  - source: FAA
    term: N-number
  - source: ICAO
    term: registration mark
  rust:
    type_name: AircraftRegistration
    field_name: aircraft_registration
  schema:
    field_name: aircraft_registration
  notes:
  - Do not use tail_number in canonical schemas or durable Rust identifiers.
- canonical: sample_count
  namespace: domain.term
  display_label: Sample Count
  definition: Number of samples in a collection, window, or buffer when the collection context is explicitly declared.
  status: approved
  aliases:
  - n_samples
  - observation_count
  rust:
    field_name: sample_count
  schema:
    field_name: sample_count
  notes:
  - Avoid bare n in Rust. Use sample_count or a context-specific count identifier.
- canonical: node_count
  namespace: domain.term
  display_label: Node Count
  definition: Number of nodes in a graph, tree, network, or topology object.
  status: approved
  aliases:
  - n_nodes
  - vertex_count
  rust:
    field_name: node_count
  schema:
    field_name: node_count
- canonical: sample_interval
  namespace: domain.term
  display_label: Sample Interval
  definition: Time interval between adjacent samples in a regularly sampled sequence.
  status: approved
  aliases:
  - delta_t
  - dt
  unit_required: true
  rust:
    field_name: sample_interval_seconds
  schema:
    field_name: sample_interval_seconds
  notes:
  - In Rust, prefer sample_interval_seconds unless a unit-bearing type is used.
- canonical: ground_speed
  namespace: domain.term
  display_label: Ground Speed
  definition: Magnitude of horizontal velocity relative to the ground.
  status: approved
  aliases:
  - groundspeed
  - gs
  unit_required: true
  frame_required: true
  rust:
    type_name: GroundSpeed
    field_name: ground_speed
  schema:
    field_name: ground_speed_mps
- canonical: station
  namespace: domain.term
  display_label: Station
  definition: Ambiguous term requiring context. Do not use as a canonical field without qualifier.
  status: ambiguous
  candidates:
  - airport_station
  - maintenance_station
  - fuselage_station
  - reporting_station
  resolution_required: true
  notes:
  - The bare term station is forbidden in schemas and durable Rust identifiers.
- canonical: guidance_navigation_and_control
  namespace: domain.term
  display_label: Guidance, Navigation, and Control
  definition: Integrated flight-system functions that estimate state, plan or follow guidance objectives, and command control actions.
  status: candidate
  aliases:
  - GNC
  - GN&C
  rust:
    module_name: gnc
  schema:
    field_prefix: gnc
  notes:
  - Candidate seed. Approve only within a declared spacecraft, aircraft, or flight-software project scope.
- canonical: entry_descent_and_landing
  namespace: domain.term
  display_label: Entry, Descent, and Landing
  definition: Mission phase spanning atmospheric entry, controlled descent, and landing or touchdown operations.
  status: candidate
  aliases:
  - EDL
  notes:
  - Candidate seed. Scope to planetary mission usage unless a program glossary says otherwise.
- canonical: low_earth_orbit
  namespace: domain.term
  display_label: Low Earth Orbit
  definition: Earth-orbit regime commonly called LEO; exact altitude bounds must be supplied by the governing source or project.
  status: candidate
  aliases:
  - LEO
  notes:
  - Do not encode numeric altitude thresholds without a cited authority.
- canonical: medium_earth_orbit
  namespace: domain.term
  display_label: Medium Earth Orbit
  definition: Earth-orbit regime commonly called MEO; exact altitude bounds must be supplied by the governing source or project.
  status: candidate
