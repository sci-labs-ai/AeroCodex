- canonical: preliminary_design_review
  namespace: domain.term
  display_label: Preliminary Design Review
  definition: Program lifecycle review commonly used to assess whether a preliminary design is ready to proceed toward detailed design.
  status: candidate
  aliases:
  - PDR
  notes:
  - Review entrance/exit criteria are project- or authority-specific.
- canonical: critical_design_review
  namespace: domain.term
  display_label: Critical Design Review
  definition: Program lifecycle review commonly used to assess whether a detailed design is mature enough to proceed toward fabrication, integration, or implementation.
  status: candidate
  aliases:
  - CDR
  notes:
  - Token CDR is ambiguous; use only in program-review context or after explicit definition.
- canonical: command_data_recorder
  namespace: domain.term
