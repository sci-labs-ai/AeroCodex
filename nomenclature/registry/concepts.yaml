  definition: Candidate avionics or spacecraft data-system meaning for CDR; keep project-local unless approved by a governing glossary.
  status: candidate
  aliases:
  - CDR
  notes:
  - Included to demonstrate acronym collisions. Remove or replace if not part of the AeroCodex vocabulary.
