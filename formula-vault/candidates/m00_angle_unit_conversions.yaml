formula_contract:
  formula_ids:
    - formula_vault.m00.angle.deg2rad
    - formula_vault.m00.angle.rad2deg
    - formula_vault.m00.angle.wrap2pi
  selected_functions:
    - rust_function: app_deg2rad
      scilab_function: foa_app_ast_app_deg2rad
      contract_intent: convert finite degree-valued angle metadata to radians; exact expression remains pending future source review before implementation.
    - rust_function: app_rad2deg
      scilab_function: foa_app_ast_app_rad2deg
      contract_intent: convert finite radian-valued angle metadata to degrees; exact expression remains pending future source review before implementation.
    - rust_function: app_wrap2pi
      scilab_function: foa_app_ast_app_wrap2pi
      contract_intent: normalize a finite radian angle into a two-pi interval; interval endpoint policy remains pending future source review before implementation.
  variables:
    - name: angle_degrees
      applies_to: formula_vault.m00.angle.deg2rad
      unit: degree
      type: finite_real_scalar
    - name: angle_radians
      applies_to:
        - formula_vault.m00.angle.rad2deg
        - formula_vault.m00.angle.wrap2pi
      unit: radian
      type: finite_real_scalar
  units:
    - degree
    - radian
  coordinate_frames:
    - not_frame_dependent
  time_scales:
    - not_time_scale_dependent
  sign_conventions:
    - positive angles follow the source-row convention; exact orientation is pending human source review before implementation.
  valid_domain:
    - finite real scalar inputs only
  singularities:
    - none identified for the metadata-only candidate; non-finite inputs remain excluded.
  invalid_regions:
    - NaN inputs are excluded.
    - positive or negative infinity inputs are excluded.
  branch_behavior:
    - deg2rad and rad2deg are single-branch metadata candidates.
    - wrap2pi interval endpoint behavior is not promoted until future source review and equivalence evidence exist.
  tolerance_policy:
    absolute_tolerance: pending_future_equivalence_plan
    relative_tolerance: pending_future_equivalence_plan
    rationale: No numerical tolerance is claimed in Chunk 7B because no executable implementation or reference fixture is promoted.

