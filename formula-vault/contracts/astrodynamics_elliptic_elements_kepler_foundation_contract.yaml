    output_variable: specific_angular_momentum_m2_s
    test_strategy: exact
    contract_state: compiler_probe_ready
    failure_policy: reject_nonfinite_cartesian_components_and_nonfinite_cross_product
    numerical_policy: bounded_f64_vector_cross_probe
  - formula_id: formula_vault.astrodynamics.elements.node_vector
    runtime_symbol: elements::compute_node_vector
    output_variable: node_vector_m2_s
    test_strategy: exact
    contract_state: compiler_probe_ready
    failure_policy: reject_nonfinite_vector_components_and_nonfinite_result
    numerical_policy: bounded_f64_direct_vector_probe
