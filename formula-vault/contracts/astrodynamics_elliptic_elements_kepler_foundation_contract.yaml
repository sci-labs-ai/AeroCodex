# Governed existing-runtime equation contract backfill.
# Metadata and compiler-probe contract only; no runtime kernel is changed.

schema_version: formula_vault_runtime_contract.v1
record_status: existing_runtime_contract_research_required
contract_id: formula_vault.astrodynamics.elliptic_elements_kepler_foundation
title: Bounded elliptic element and Kepler scalar helper contracts
validation_status: research_required
primary_validation_card: validation/cards/validation_astrodynamics_time_frame_tle_foundation.yaml
primary_source_seed: validation/source_registry/source_astrodynamics_time_frame_tle_foundation.yaml
secondary_validation_context:
  - validation/cards/validation_orekit_reference_oracle_mapping.yaml
  - validation/source_registry/source_orekit_reference_oracle_mapping.yaml
runtime_policy:
  finite_inputs_required: true
  positive_gravitational_parameter_required: true
  positive_semimajor_axis_required: true
  explicit_positive_singularity_tolerances_required: true
  non_singular_elliptic_domain_only: true
  angles_normalized_by_runtime_contract: true
  nonfinite_outputs_rejected: true
  ieee754_f64_rounding_applies: true
  deterministic_same_build_platform: true
evidence_policy:
  compiler_verified_runtime_symbols: true
  module_qualified_runtime_symbols_supported: true
  bounded_contract_probes: true
  orekit_role: external_reference_planning_only
  validation_status_upgrade: blocked_without_exact_source_oracle_and_tolerance_review
explicit_exclusions:
  solve_kepler_elliptic_newton: solver_policy_blocked_not_a_formula_node_in_this_batch
  compute_orbital_elements_basic: aggregate_helper_not_counted_as_an_individual_equation
  frame_transform_functions: support_policy_not_formula_nodes
  time_scale_functions: support_policy_not_formula_nodes
  tle_functions: contract_only_parser_authorization_false
non_claims:
  no_orekit_source_tests_fixtures_or_architecture_import: true
  no_orekit_parity_claim: true
  no_solver_convergence_approval: true
  no_frame_transform_or_time_scale_conversion: true
  no_tle_parser_sgp4_or_teme_capability: true
  no_orbit_determination_or_propagation_claim: true
  no_certification_evidence: true
  no_operational_readiness_claim: true
  no_full_equation_inventory_completion_claim: true
formulas:
