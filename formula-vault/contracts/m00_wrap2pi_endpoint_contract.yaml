interval_contract:
  interval_review_state: reviewed_interval_0_to_2pi_exclusive_upper
  mathematical_interval: '[0, 2*pi)'
  lower_endpoint: inclusive
  upper_endpoint: exclusive
  period: 2*pi
  units: radians
  valid_domain: all finite real scalar radian inputs
  invalid_inputs:
    - NaN
    - positive_infinity
    - negative_infinity
  invalid_input_policy: reject_before_wrapping
  coordinate_frame_dependence: none
  time_scale_dependence: none
  singularities: none
  branch_behavior:
    exact_zero: returns_canonical_positive_zero
    exact_positive_zero: returns_canonical_positive_zero
    exact_negative_zero: returns_canonical_positive_zero
    exact_positive_two_pi: returns_canonical_positive_zero
    exact_negative_two_pi: returns_canonical_positive_zero
    exact_positive_pi: returns_pi
    exact_negative_pi: returns_pi
    exact_positive_three_pi: returns_pi
    exact_negative_three_pi: returns_pi
    positive_small_angle: returns_input_angle
    negative_small_angle: returns_two_pi_minus_absolute_angle
  signed_zero_policy:
    source_sign_bit_status: not_claimed_not_source_derived
    aerocodex_rust_contract_choice: canonicalize_any_zero_output_to_positive_zero
    rationale: deterministic f64 endpoint tests should not expose negative zero as a distinct mathematical angle
  large_magnitude_policy:
    regression_scope: bounded_f64_vectors_only
    exactness_limit: no_arbitrary_huge_magnitude_exactness_claim
    rationale: finite f64 remainder operations can lose low-order information for very large magnitudes; large multiple vectors are bounded regression cases, not certification evidence
  tolerance_policy:
    endpoint_exact_zero_cases: require_exact_positive_zero_after_canonicalization
    ordinary_absolute_tolerance: 1.0e-15
    ordinary_relative_tolerance: 1.0e-15
    large_multiple_absolute_tolerance: 1.0e-12
    decimal_residue_absolute_tolerance: 1.0e-14

reference_oracle:
  type: independent_interval_contract
  identity: angle modulo 2*pi, represented in the half-open interval [0, 2*pi)
  periodicity: wrap2pi(x + k*2*pi) equals wrap2pi(x) for finite integer k within bounded f64 regression scope
  endpoint_non_claim: this is not external Scilab parity evidence and not certification evidence

