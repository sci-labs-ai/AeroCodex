promotion_gate:
  default_state: blocked
  metadata_deployment_allowed: true
  implementation_allowed_in_this_chunk: false
  required_before_implementation:
    - deployment agent accepts the endpoint contract and signed-zero policy
    - Rust implementation chunk is explicitly authorized later
    - implementation rejects non-finite inputs before wrapping
    - implementation canonicalizes zero outputs to positive zero or the contract is revised explicitly
    - unit tests cover every required endpoint case in the CSV table
    - no M07 raw source, comments, control flow, generated code, Scilab output, archive contents, or fixtures are committed
    - validation status remains research_required until independent evidence justifies a later upgrade

